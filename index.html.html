<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>AI Study Hub v44 - Polyglot Update</title>
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --accent: #00a884; --text: #e9edef; --border: #222e35; }
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            display: grid; grid-template-columns: 280px 1fr 600px; 
            height: 100vh; width: 100vw; overflow: hidden; 
        }

        /* SIDEBAR */
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .settings-container { background: #202c33; border-radius: 15px; padding: 12px; border: 1px solid var(--border); text-align: center; }
        
        /* GLOBE */
        .globe-wrapper { width: 100px; height: 100px; margin: 0 auto 10px; perspective: 1000px; }
        .globe { width: 100%; height: 100%; border-radius: 50%; background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Earth_Western_Hemisphere_transparent_background.png/600px-Earth_Western_Hemisphere_transparent_background.png'); background-size: cover; box-shadow: inset -10px -10px 30px rgba(0,0,0,0.8); animation: rotateGlobe 12s linear infinite; }
        @keyframes rotateGlobe { from { background-position: 0 0; } to { background-position: 200px 0; } }

        /* PREFERENZE */
        .pref-item { display: flex; justify-content: space-between; align-items: center; background: #2a3942; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; }

        /* TRADUTTORE AVANZATO */
        .translator-vignette { background: #111b21; border: 2px solid var(--accent); border-radius: 12px; padding: 15px; box-shadow: 0 0 10px rgba(0,168,132,0.2); }
        .translator-vignette h4 { margin: 0 0 10px 0; font-size: 10px; color: var(--accent); text-transform: uppercase; }
        .trans-input { width: 100%; background: #2a3942; border: none; padding: 10px; border-radius: 6px; color: white; margin-bottom: 8px; outline: none; font-size: 13px; }
        .trans-select { width: 100%; background: #2a3942; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; margin-bottom: 12px; font-size: 12px; cursor: pointer; }
        .trans-btn { width: 100%; background: var(--accent); border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .trans-btn:hover { background: #008f70; }

        /* CHAT & PANELS */
        .main-chat { display: flex; flex-direction: column; background: var(--bg); border-right: 1px solid var(--border); }
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px; border-radius: 10px; font-size: 14px; max-width: 85%; }
        .bot { background: #202c33; align-self: flex-start; border-left: 3px solid var(--accent); }
        .tu { background: #005c4b; align-self: flex-end; }
        .input-area { padding: 15px; background: #202c33; display: flex; gap: 8px; }
        input#user-in { flex: 1; padding: 12px; border-radius: 6px; border: none; background: #2a3942; color: white; outline: none; }

        .right-panel { background: #1a1a1a; display: flex; flex-direction: column; }
        .view-selector { display: flex; background: #202c33; padding: 8px; gap: 8px; }
        .view-btn { flex: 1; padding: 10px; border: none; background: #2a3942; color: #8696a0; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .view-btn.active { background: var(--accent); color: white; }

        #board-view { background: #ffffff; color: #1a1a1a; padding: 30px; overflow-y: auto; height: 100%; }
        #wiki-view { width: 100%; height: 100%; border: none; display: none; }

        .board-item { border-bottom: 1px solid #eee; padding: 15px 0; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
        .type-tag { font-size: 9px; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; }
        .entry-main { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }

        /* SWITCH */
        .switch { position: relative; width: 34px; height: 18px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="settings-container">
            <div class="globe-wrapper"><div class="globe"></div></div>
            <div id="t-display" style="font-size: 18px; color: #ffbc00; margin-bottom: 5px;">25:00</div>
            <button onclick="toggleTimer()" style="background:var(--accent); border:none; color:white; width:100%; padding:5px; border-radius:4px; cursor:pointer; font-size:10px;">STUDY TIMER ON/OFF</button>
        </div>

        <div class="settings-container">
            <h4 style="color:var(--accent); font-size:10px; margin-bottom:10px;">PREFERENZE</h4>
            <div class="pref-item">
                <span>Sintesi Vocale</span>
                <label class="switch"><input type="checkbox" id="pref-voice" onchange="savePrefs()"><span class="slider"></span></label>
            </div>
            <div class="pref-item">
                <span>Wiki Dark Mode</span>
                <label class="switch"><input type="checkbox" id="pref-dark" onchange="savePrefs()"><span class="slider"></span></label>
            </div>
        </div>

        <div class="translator-vignette">
            <h4>🌐 Polyglot Translator</h4>
            <input type="text" id="trans-text" class="trans-input" placeholder="Parola o frase...">
            <select id="trans-lang" class="trans-select">
                <optgroup label="Europee">
                    <option value="en">Inglese 🇬🇧</option>
                    <option value="fr">Francese 🇫🇷</option>
                    <option value="de">Tedesco 🇩🇪</option>
                    <option value="es">Spagnolo 🇪🇸</option>
                    <option value="pt">Portoghese 🇵🇹</option>
                    <option value="ru">Russo 🇷🇺</option>
                </optgroup>
                <optgroup label="Classiche">
                    <option value="la">Latino 🏛️</option>
                    <option value="el">Greco Moderno 🇬🇷</option>
                </optgroup>
                <optgroup label="Orientali">
                    <option value="zh">Cinese 🇨🇳</option>
                    <option value="ja">Giapponese 🇯🇵</option>
                    <option value="ar">Arabo 🇸🇦</option>
                    <option value="hi">Hindi 🇮🇳</option>
                </optgroup>
            </select>
            <button class="trans-btn" onclick="traduciSuLavagna()">TRADUCI & SALVA</button>
        </div>
        
        <button onclick="clearHistory()" style="background:#ea0038; border:none; color:white; padding:8px; border-radius:5px; cursor:pointer; font-size:11px;">PULISCI SESSIONE</button>
    </div>

    <div class="main-chat">
        <div id="chat-display"></div>
        <div class="input-area">
            <input type="text" id="user-in" placeholder="Chiedi o calcola..." autocomplete="off">
            <button onclick="invia()" style="width: 60px; background: var(--accent); border:none; color:white; border-radius:5px; cursor:pointer;">OK</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="view-selector">
            <button class="view-btn active" id="btn-board" onclick="showView('board')">📝 LAVAGNA</button>
            <button class="view-btn" id="btn-wiki" onclick="showView('wiki')">🌐 WIKIPEDIA</button>
        </div>
        <div id="board-view"><div id="unified-history"></div></div>
        <iframe id="wiki-view" src="https://it.m.wikipedia.org/wiki/Pagina_principale"></iframe>
    </div>

<script>
    const chat = document.getElementById("chat-display");
    const input = document.getElementById("user-in");
    const history = document.getElementById("unified-history");
    const wiki = document.getElementById("wiki-view");
    let timer;

    // PREFERENZE PERSISTENTI
    function savePrefs() {
        const voice = document.getElementById('pref-voice').checked;
        const dark = document.getElementById('pref-dark').checked;
        localStorage.setItem('hub_voice', voice);
        localStorage.setItem('hub_dark', dark);
        applyPrefs();
    }

    function applyPrefs() {
        const dark = localStorage.getItem('hub_dark') === 'true';
        wiki.style.filter = dark ? "invert(1) hue-rotate(180deg)" : "none";
        document.getElementById('pref-dark').checked = dark;
        document.getElementById('pref-voice').checked = localStorage.getItem('hub_voice') === 'true';
    }

    function loadPrefs() {
        if(localStorage.getItem('hub_voice') === null) {
            localStorage.setItem('hub_voice', true);
            localStorage.setItem('hub_dark', false);
        }
        applyPrefs();
    }

    // GESTIONE VISTA
    function showView(type) {
        document.getElementById('board-view').style.display = type === 'board' ? 'block' : 'none';
        document.getElementById('wiki-view').style.display = type === 'wiki' ? 'block' : 'none';
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
    }

    // AGGIUNTA ALLA LAVAGNA
    function addToBoard(type, original, result, langName = "") {
        const div = document.createElement("div");
        div.className = "board-item";
        const color = type === 'math' ? '#e3f2fd' : '#e8f5e9';
        const label = type === 'math' ? 'Calcolo' : `Traduzione (${langName})`;
        div.innerHTML = `
            <span class="type-tag" style="background:${color}">${label}</span>
            <small style="display:block;color:#666;margin-top:5px;">Originale: ${original}</small>
            <span class="entry-main">${result}</span>
        `;
        history.prepend(div);
        showView('board');
    }

    async function traduciSuLavagna() {
        const text = document.getElementById("trans-text").value.trim();
        const langSelect = document.getElementById("trans-lang");
        const lang = langSelect.value;
        const langName = langSelect.options[langSelect.selectedIndex].text;
        
        if(!text) return;
        
        try {
            const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=it|${lang}`);
            const data = await resp.json();
            const translated = data.responseData.translatedText;
            
            addToBoard('trans', text, translated, langName);
            print("Bot", `Traduzione in ${langName} completata e salvata in lavagna.`);
            document.getElementById("trans-text").value = "";
        } catch (e) {
            print("Bot", "Errore: Servizio di traduzione non raggiungibile.");
        }
    }

    function print(who, txt) {
        const d = document.createElement("div");
        d.className = "msg " + (who === "Bot" ? "bot" : "tu");
        d.innerHTML = `<b>${who}:</b> ${txt}`;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        if(who === "Bot" && localStorage.getItem('hub_voice') === 'true') {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(txt.replace(/<[^>]*>?/gm, ''));
            m.lang = 'it-IT';
            window.speechSynthesis.speak(m);
        }
    }

    function invia() {
        const val = input.value.trim();
        if(!val) return;
        print("Tu", val);
        input.value = "";
        if (/^[0-9+\-*/().\s^%]+$/.test(val)) {
            try {
                let res = eval(val.replace(/(\d+)%/g, "($1/100)").replace("^", "**"));
                addToBoard('math', val, res);
                print("Bot", `Risultato matematico: <b>${res}</b>`);
            } catch(e) { print("Bot", "Errore nel calcolo."); }
        } else {
            wiki.src = `https://it.m.wikipedia.org/wiki/${encodeURIComponent(val)}`;
            showView('wiki');
            print("Bot", `Cercando informazioni su: <b>${val}</b>`);
        }
    }

    function clearHistory() { history.innerHTML = ""; chat.innerHTML = ""; }
    
    function toggleTimer() {
        if(timer) { clearInterval(timer); timer = null; return; }
        let s = 25 * 60;
        timer = setInterval(() => {
            let m=Math.floor(s/60), sec=s%60;
            document.getElementById("t-display").innerText = `${m}:${sec<10?'0':''}${sec}`;
            if(s-- <= 0) clearInterval(timer);
        }, 1000);
    }

    input.addEventListener("keypress", (e) => { if(e.key==='Enter') invia(); });
    window.onload = loadPrefs;
</script>
</body>
</html>
